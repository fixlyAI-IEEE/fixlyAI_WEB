<div class="flex min-h-screen bg-gray-100">

  <!-- Sidebar -->
  <aside class="w-64 bg-white shadow-md p-5">
    <h2 class="text-2xl font-bold text-[var(--secondary)] mb-8">Fixly AI</h2>

    <button class="w-full bg-[var(--secondary)] text-white py-2 rounded-lg mb-4">
      الرئيسية
    </button>
  </aside>

  <!-- Main -->
  <main class="flex-1 p-6 space-y-6">

    <!-- Stats -->
    <div class="bg-white p-4 rounded-xl shadow flex justify-between text-center">

      <div>
        <p class="text-gray-400 text-sm">إجمالي الطلبات</p>
        <h3 class="font-bold text-lg">45</h3>
      </div>

      <div>
        <p class="text-gray-400 text-sm">طلبات نشطة</p>
        <h3 class="font-bold text-lg">5</h3>
      </div>

      <div>
        <p class="text-gray-400 text-sm">العمولة</p>
        <h3 class="font-bold text-lg">45ج</h3>
      </div>

      <div>
        <p class="text-gray-400 text-sm">عمولة المنصة</p>
        <h3 class="font-bold text-lg">15ج</h3>
      </div>

    </div>

    <!-- Content -->
    <div class="grid grid-cols-3 gap-6">

      <!-- Requests -->
      <div class="space-y-3">

        <div *ngFor="let req of requests"
             class="bg-white p-3 rounded-xl shadow flex flex-col gap-2">

          <h3 class="font-bold text-sm">
            {{ req.job_type?.name }}
          </h3>

          <p class="text-xs text-gray-500">
            {{ req.description }}
          </p>

          <span class="text-xs text-gray-400">
            📍 {{ req.city }}
          </span>

          <!-- Status -->
          <span
            class="text-xs px-2 py-1 rounded-full w-fit"
            [ngClass]="{
              'bg-green-100 text-green-700': req.pivot_status === 'offered',
              'bg-yellow-100 text-yellow-700': req.status === 'pending'
            }">
            {{ req.pivot_status === 'offered' ? 'تم الإرسال' : 'جديد' }}
          </span>

          <!-- Button -->
          <button
            class="mt-2 w-full py-2 rounded-lg text-white text-sm"
            [ngClass]="{
              'bg-gray-400': req.pivot_status === 'offered',
              'bg-[var(--secondary)]': req.pivot_status !== 'offered'
            }"
            (click)="sendOffer(req.id)"
          >
            {{ req.pivot_status === 'offered' ? 'تم الإرسال' : 'إرسال عرض' }}
          </button>

        </div>

      </div>

      <!-- Map -->
      <div class="col-span-2 bg-white rounded-xl shadow p-2">

        <div id="map" class="w-full h-[500px] rounded-lg"></div>

      </div>

    </div>

  </main>

</div>
