<nav [class]="isScrolled() ?
  'w-full fixed top-0 left-0 right-0 z-40 bg-white shadow-sm transition-all px-8':
  'w-full fixed top-0 left-0 right-0 z-40 bg-transparent transition-all px-8'">

  <div class="max-w-8xl mx-auto px-6 flex items-center justify-between h-[72px]">

    <img src="/images/fixly_AI.svg" class="h-9 w-28 flex-shrink-0" />

    <ul class="hidden lg:flex items-center gap-8 whitespace-nowrap text-[15px] font-medium text-[var(--primary)]">
    <li class="hover:text-[var(--secondary)] cursor-pointer" routerLink="/services">الخدمات</li>
<li class="hover:text-[var(--secondary)] cursor-pointer" (click)="scrollTo('how-it-works')">كيف يعمل</li>
<li class="hover:text-[var(--secondary)] cursor-pointer" (click)="scrollTo('workers')">الفنيين</li>
<li class="hover:text-[var(--secondary)] cursor-pointer" (click)="scrollTo('reviews')">آراء العملاء</li>
<li class="hover:text-[var(--secondary)] cursor-pointer" (click)="scrollTo('contact')">تواصل معنا</li>
    </ul>

    <div class="flex items-center gap-3 flex-shrink-0">

      @if (isLoggedIn()) {
        <div class="hidden lg:flex items-center gap-3">
          <span class="text-[var(--primary)] font-bold text-[15px]">{{ userName() }}</span>
          <button
            (click)="logout()"
            class="flex items-center gap-2 border-2 border-[var(--primary)] text-[var(--primary)] px-5 py-2 rounded-full hover:bg-[var(--primary)] hover:text-white transition whitespace-nowrap">
            تسجيل الخروج
          </button>
        </div>
      } @else {
        <button [routerLink]="['/auth/login']"
          class="hidden lg:flex items-center gap-2 bg-[var(--secondary)] text-white px-5 py-2 rounded-full hover:bg-[var(--hover)] transition whitespace-nowrap">
          <span>تسجيل الدخول</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5" />
            <polyline points="12 19 5 12 12 5" />
          </svg>
        </button>
      }

      <button class="lg:hidden text-2xl" (click)="isOpen.set(!isOpen())">
        <svg *ngIf="!isOpen()" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
        <svg *ngIf="isOpen()" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>

    </div>
  </div>

  <!-- Dropdown Menu-->
  @if (isOpen()) {
  <div class="absolute top-[72px] left-0 w-full bg-white border-t border-gray-100 shadow-md lg:hidden">
    <div class="px-6 py-4 space-y-4 text-right text-[var(--primary)]">
      <div class="py-2 border-b">الخدمات</div>
      <div class="py-2 border-b">كيف يعمل</div>
      <div class="py-2 border-b">الفنيين</div>
      <div class="py-2 border-b">آراء العملاء</div>
      <div class="py-2">تواصل معنا</div>

      @if (isLoggedIn()) {
        <div class="py-2 border-t flex items-center justify-between">
          <button (click)="logout()" class="text-red-500 font-bold">تسجيل الخروج</button>
          <span class="text-[var(--primary)] font-bold">{{ userName() }}</span>
        </div>
      } @else {
        <button [routerLink]="['/auth/login']" class="w-full mt-3 bg-[var(--secondary)] text-white px-5 py-2 rounded-full">
          تسجيل الدخول
        </button>
      }
    </div>
  </div>
  }

</nav>
