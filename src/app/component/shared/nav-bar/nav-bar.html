<nav [class]="isScrolled() ?
  'w-full fixed top-0 left-0 right-0 z-50 bg-white shadow-sm transition-all px-8' :
  'w-full fixed top-0 left-0 right-0 z-50 bg-transparent transition-all px-8'">

  <div class="container mx-auto px-6 flex items-center justify-between h-[72px]">

    <img src="/images/fixly_AI.svg" class="h-9 w-28 flex-shrink-0" />

    <ul class="hidden lg:flex items-center gap-8 whitespace-nowrap text-[15px] font-medium text-[var(--primary)]">
      <li class="hover:text-[var(--secondary)] cursor-pointer">الخدمات</li>
      <li class="hover:text-[var(--secondary)] cursor-pointer">كيف يعمل</li>
      <li class="hover:text-[var(--secondary)] cursor-pointer">الفنيين</li>
      <li class="hover:text-[var(--secondary)] cursor-pointer">آراء العملاء</li>
      <li class="hover:text-[var(--secondary)] cursor-pointer">تواصل معنا</li>
    </ul>

    <div class="flex items-center gap-3 flex-shrink-0">

      <button [routerLink]="['/auth/login']"
        class="hidden lg:flex items-center gap-2 bg-[var(--secondary)] text-white px-5 py-2 rounded-full hover:bg-[var(--hover)] transition whitespace-nowrap">
        <span>تسجيل الدخول</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5" />
          <polyline points="12 19 5 12 12 5" />
        </svg>
      </button>

      <button class="lg:hidden text-2xl" (click)="isOpen.set(!isOpen())">

        <svg *ngIf="!isOpen()" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>

        <svg *ngIf="isOpen()" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>

      </button>

    </div>
  </div>

  <!-- Dropdown Menu-->
  @if (isOpen()) {
  <div class="absolute top-[72px] left-0 w-full bg-white border-t border-gray-100 shadow-md lg:hidden">

    <div class="px-6 py-4 space-y-4 text-right text-[var(--primary)]">

      <div class="py-2 border-b">الخدمات</div>
      <div class="py-2 border-b">كيف يعمل</div>
      <div class="py-2 border-b">الفنيين</div>
      <div class="py-2 border-b">آراء العملاء</div>
      <div class="py-2">تواصل معنا</div>

      <button class="w-full mt-3 bg-[var(--secondary)] text-white px-5 py-2 rounded-full">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
          <polyline points="10 17 15 12 10 7" />
          <line x1="15" y1="12" x2="3" y2="12" />
        </svg>
        تسجيل الدخول
      </button>

    </div>

  </div>
  }

</nav>
