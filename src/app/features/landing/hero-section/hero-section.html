<section class="relative flex flex-col lg:flex-row-reverse min-h-screen bg-white mb-20">


 <div class="w-full h-[250px] lg:absolute lg:top-0 lg:left-0 lg:w-[52%] lg:h-full">
    <img
      src="/images/23bfdd735c0d9fdf3833d3274b2df9dabbf7891f.jpg"
      alt="فنيين"
      class="w-full h-full object-cover object-center"
    />
  </div>


  <div
    class="hidden lg:block absolute top-0 left-0 w-[55%] h-full bg-white z-[3]"
    style="clip-path: polygon(87% 0%, 100% 0%, 100% 100%, 72% 100%)"
  ></div>



<div class="relative z-[5] flex flex-col justify-center w-full lg:w-[50%] mr-0 mt-20 ml-auto px-6 lg:px-16 pt-10 lg:pt-32 pb-10 lg:pb-16 text-right">

   <h1 class="text-[32px] lg:text-[44px] font-extrabold leading-snug text-[var(--primary)] mb-4">
      كل الخدمات اللي تحتاجها...<br>
      <span class="text-[var(--secondary)]">واسألنا نساعدك تختار الصح</span>
    </h1>

    <p class="text-[16px] text-[var(--text)] leading-relaxed mb-8 max-w-[400px] ml-auto mr-0">
      منصة ذكية تربطك بأفضل الفنيين ومقدمي الخدمات حولك.
      اوصف مشكلتك للمساعد الذكي، واحصل على الفني المناسب فوراً.
    </p>

   <div class="flex flex-col sm:flex-row gap-3 mb-10">
      <button class="bg-[var(--secondary)] hover:bg-[var(--hover)] text-white px-7 py-3 rounded-full font-bold flex items-center gap-2 transition">
        <span>←</span> اطلب خدمة
      </button>
      <button (click)="openChat()"class="border-2 border-[var(--primary)] text-[var(--primary)] hover:bg-[var(--primary)] hover:text-white px-7 py-3 rounded-full font-bold flex items-center gap-2 transition">
        اسأل Fixly Bot
      </button>
    </div>

<div class="grid grid-cols-3 gap-3 sm:gap-4">
      <div class="flex flex-col items-center bg-white border border-[#d1fae5] rounded-2xl px-6 py-4 min-w-[100px]">
        <span class="text-[22px] font-bold text-[var(--secondary)]">98%</span>
        <span class="text-[12px] text-[var(--text)] mt-1">رضا العملاء</span>
      </div>
      <div class="flex flex-col items-center bg-white border border-[#d1fae5] rounded-2xl px-6 py-4 min-w-[100px]">
        <span class="text-[22px] font-bold text-[var(--secondary)]">+8K</span>
        <span class="text-[12px] text-[var(--text)] mt-1">طلب مكتمل</span>
      </div>
      <div class="flex flex-col items-center bg-white border border-[#d1fae5] rounded-2xl px-6 py-4 min-w-[100px]">
        <span class="text-[22px] font-bold text-[var(--secondary)]">+500</span>
        <span class="text-[12px] text-[var(--text)] mt-1">فني معتمد</span>
      </div>
    </div>

  </div>

</section>
