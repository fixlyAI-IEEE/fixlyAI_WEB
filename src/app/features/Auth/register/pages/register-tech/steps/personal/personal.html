<div class="flex flex-col gap-4">

    <div>
        <label class="field-label">الأسم كامل</label>
        <div class="input-wrapper">
            <input type="text" formControlName="name" placeholder="الأسم كامل" [class.input-error]="isInvalid('name')">
            <i class="fas fa-user input-icon"></i>
        </div>
        <span class="error-msg" *ngIf="isInvalid('name')">الاسم مطلوب (3 أحرف على الأقل)</span>
    </div>

    <div>
        <label class="field-label">رقم الهاتف</label>
        <div class="input-wrapper">
            <input type="tel" formControlName="phone" placeholder="01012345678"
                [class.input-error]="isInvalid('phone')">
            <i class="fas fa-phone input-icon"></i>
        </div>
        <span class="error-msg" *ngIf="isInvalid('phone')">رقم الهاتف غير صحيح</span>
    </div>

    <div>
        <label class="field-label">كلمة المرور</label>
        <div class="input-wrapper">
            <input [type]="showPass ? 'text' : 'password'" formControlName="password" placeholder="••••••••"
                [class.input-error]="isInvalid('password')">
            <i class="input-icon cursor-pointer" [class]="showPass ? 'fas fa-eye' : 'fas fa-eye-slash'"
                (click)="showPass = !showPass"></i>
        </div>
        <span class="error-msg" *ngIf="isInvalid('password')">كلمة المرور 8 أحرف على الأقل</span>
    </div>

    <div>
        <label class="field-label">تأكيد كلمة المرور</label>
        <div class="input-wrapper">
            <input [type]="showPassConfirm ? 'text' : 'password'" formControlName="password_confirmation"
                placeholder="••••••••" [class.input-error]="isInvalid('password_confirmation') || passwordMismatch">
            <i class="input-icon cursor-pointer" [class]="showPassConfirm ? 'fas fa-eye' : 'fas fa-eye-slash'"
                (click)="showPassConfirm = !showPassConfirm"></i>
        </div>
        <span class="error-msg" *ngIf="passwordMismatch">كلمة المرور غير متطابقة</span>
    </div>

    <div>
        <label class="field-label">الصورة الشخصية <span
                style="color:var(--text); font-size:12px">(اختياري)</span></label>
        <label class="upload-box cursor-pointer">
            <i class="fas fa-camera" style="color: var(--secondary)"></i>
            <div>
                <p class="font-medium" style="color: var(--primary)">رفع صورة شخصية</p>
                <p style="font-size: 12px">JPG, PNG - 5MB حد أقصى</p>
            </div>
            <input type="file" accept="image/png, image/jpeg" class="hidden" (change)="onFileChange($event)">
        </label>
        <p class="text-xs mt-1" style="color: var(--secondary)" *ngIf="form.get('profile_picture')?.value">
            ✓ تم اختيار الصورة
        </p>
    </div>

    <button type="button" class="btn-secondary mt-2" (click)="next.emit()">
        التالي
    </button>

    <p class="text-center text-sm mt-2">
        لديك حساب بالفعل؟
        <a routerLink="/auth/login" style="color: var(--secondary)" class="font-bold">سجل الدخول</a>
    </p>

</div>
