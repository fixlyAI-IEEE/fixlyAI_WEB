<form (ngSubmit)="submit()">

  <!-- ======= STEP 1 ======= -->
  <div *ngIf="currentStep === 1" class="space-y-5">

    <!-- الاسم -->
    <div>
      <label class="field-label">الأسم كامل</label>
      <div class="input-wrap">
        <input type="text" placeholder="الأسم كامل"
          [(ngModel)]="form.name" name="name"
          style="padding-right: 44px;" />
        <span class="input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="#8FA5A3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- الهاتف -->
    <div>
      <label class="field-label">رقم الهاتف</label>
      <div class="input-wrap">
        <input type="tel" placeholder="01012345678"
          [(ngModel)]="form.phone" name="phone"
          style="padding-right: 44px;" />
        <span class="input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="#8FA5A3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.18 2 2 0 0 1 3.59 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.9a16 16 0 0 0 6.29 6.29l.83-.82a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- كلمة المرور -->
    <div>
      <label class="field-label">كلمة المرور</label>
      <div class="input-wrap">
        <input [type]="showPass ? 'text' : 'password'" placeholder="••••••"
          [(ngModel)]="form.password" name="password"
          style="padding-right: 14px; padding-left: 44px;" />
        <span class="input-icon-left" (click)="showPass = !showPass">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="#8FA5A3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- تأكيد كلمة المرور -->
    <div>
      <label class="field-label">تأكيد كلمة المرور</label>
      <div class="input-wrap">
        <input [type]="showConfirm ? 'text' : 'password'" placeholder="••••••"
          [(ngModel)]="form.password_confirmation" name="password_confirmation"
          style="padding-right: 14px; padding-left: 44px;" />
        <span class="input-icon-left" (click)="showConfirm = !showConfirm">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="#8FA5A3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- صورة شخصية -->
    <div>
      <label class="field-label">الصورة الشخصية (اختياري)</label>
      <label class="upload-box cursor-pointer">
        <input type="file" accept="image/*" class="hidden"
          (change)="onImageSelect($event)" />
        <div *ngIf="!previewUrl" class="flex items-center gap-3 w-full">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0"
            style="background: #f0fdf4;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="#2BD17C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </div>
          <div class="text-right">
            <p class="text-sm font-medium" style="color: #0E3B3F;">رفع صورة شخصية</p>
            <p class="text-xs" style="color: #8FA5A3;">JPG, PNG - 5MB أقصى</p>
          </div>
        </div>
        <img *ngIf="previewUrl" [src]="previewUrl"
          class="w-12 h-12 rounded-xl object-cover" />
      </label>
    </div>

    <button type="button" (click)="nextStep()" class="submit-btn w-full font-bold text-base">
      التالي ←
    </button>

  </div>

  <!-- ======= STEP 2 ======= -->
  <div *ngIf="currentStep === 2" class="space-y-5">

    <!-- التخصص -->
    <div>
      <label class="field-label">التخصص</label>
      <div class="select-wrap">
        <select [(ngModel)]="form.job_type_id" name="job_type_id" class="select-field">
          <option [value]="null" disabled selected>اختر تخصصك</option>
          <option *ngFor="let job of jobTypes" [value]="job.id">{{ job.name }}</option>
        </select>
        <span class="select-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="#8FA5A3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- المحافظة -->
    <div>
      <label class="field-label">المحافظة</label>
      <div class="select-wrap">
        <select [(ngModel)]="form.city" name="city" class="select-field">
          <option value="" disabled selected>اختر محافظتك</option>
          <option *ngFor="let c of cities" [value]="c.value">{{ c.label }}</option>
        </select>
        <span class="select-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="#8FA5A3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- مناطق العمل -->
    <div>
      <label class="field-label">مناطق العمل</label>
      <div class="input-wrap">
        <input type="text" placeholder="مثال: مدينة نصر، مصر الجديدة"
          [(ngModel)]="form.areas" name="areas"
          style="padding-right: 44px;" />
        <span class="input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="#8FA5A3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- أيام العمل -->
    <div>
      <label class="field-label">أيام العمل</label>
      <div class="flex flex-wrap gap-2 justify-end">
        <button *ngFor="let day of days" type="button"
          class="day-btn"
          [class.day-active]="isDaySelected(day.value)"
          (click)="toggleDay(day.value)">
          {{ day.label }}
        </button>
      </div>
    </div>

    <!-- متوسط سعر الساعة -->
    <div>
      <label class="field-label">متوسط سعر الساعة للخدمة</label>
      <div class="input-wrap">
        <input type="number" placeholder="ادخل سعر الساعة للخدمة"
          [(ngModel)]="form.hourly_rate" name="hourly_rate"
          style="padding-right: 44px;" />
        <span class="input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="#8FA5A3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- الشروط والأحكام -->
    <div class="flex items-center gap-2 justify-end">
      <label class="text-xs cursor-pointer" style="color: #8FA5A3;">
        بإنشاء حساب، أنت توافق على
        <span style="color: #2BD17C;">شروط الاستخدام وسياسة الخصوصية</span>
      </label>
      <input type="checkbox" [(ngModel)]="form.agree" name="agree"
        class="w-4 h-4 cursor-pointer accent-[#2BD17C]" />
    </div>

    <!-- الأزرار -->
    <div class="flex gap-3">
      <button type="button" (click)="prevStep()"
        class="flex-1 py-3 rounded-xl font-bold text-sm transition-all"
        style="border: 1.5px solid #E5E5E5; color: #8FA5A3; background: white;">
        → رجوع
      </button>
      <button type="submit" [disabled]="isLoading"
        class="submit-btn flex-1 font-bold text-base">
        {{ isLoading ? 'جاري الإنشاء...' : 'إنشاء حساب' }}
      </button>
    </div>

  </div>

</form>
