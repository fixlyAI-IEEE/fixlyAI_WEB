<div>

  <h1 class="text-3xl font-bold text-[#0E3B3F] mb-1 text-right">
    انضم ل <span class="text-[#2BD17C]">Fixly AI</span>
  </h1>
  <p class="text-[#8FA5A3] text-sm text-right mb-8">أنشئ حسابك مجاناً في ثوانٍ</p>

  <div class="flex justify-end mb-8">
    <div class="bg-gray-100 rounded-full p-1 flex gap-1">
      <button
        type="button"
        (click)="goToTech()"
        class="px-5 py-2 rounded-full text-sm font-medium text-[#8FA5A3] transition-all"
      >انضم كفني</button>
      <button
        type="button"
        class="px-5 py-2 rounded-full text-sm font-medium bg-[#2BD17C] text-white transition-all"
      >انضم كمستخدم</button>
    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">

    <div>
      <label class="block text-[#0E3B3F] text-sm font-medium mb-2 text-right">الاسم كامل</label>
      <div class="relative">
        <input
          type="text"
          formControlName="fullName"
          placeholder="الأسم كامل"
          class="w-full px-4 py-3 pr-4 pl-10 border border-gray-200 rounded-xl text-right focus:outline-none focus:border-[#0E3B3F] placeholder:text-gray-300 text-[#0E3B3F]"
        >
        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[#8FA5A3]">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
        </span>
      </div>
    </div>

    <div>
      <label class="block text-[#0E3B3F] text-sm font-medium mb-2 text-right">رقم الهاتف</label>
      <div class="relative">
        <input
          type="tel"
          formControlName="phone"
          placeholder="01012345678"
          class="w-full px-4 py-3 pl-10 border border-gray-200 rounded-xl text-right focus:outline-none focus:border-[#0E3B3F] placeholder:text-gray-300 text-[#0E3B3F]"
        >
        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[#8FA5A3]">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
          </svg>
        </span>
      </div>
    </div>

    <div>
      <label class="block text-[#0E3B3F] text-sm font-medium mb-2 text-right">كلمة المرور</label>
      <div class="relative">
        <input
          [type]="showPassword ? 'text' : 'password'"
          formControlName="password"
          placeholder="••••"
          class="w-full px-4 py-3 pl-10 border border-gray-200 rounded-xl text-right focus:outline-none focus:border-[#0E3B3F] placeholder:text-gray-400 text-[#0E3B3F]"
        >
        <button
          type="button"
          (click)="showPassword = !showPassword"
          class="absolute left-4 top-1/2 -translate-y-1/2 text-[#8FA5A3] hover:text-[#0E3B3F] transition-colors"
        >
          <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
          <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="flex items-center gap-2 justify-end">
      <label for="terms" class="text-xs text-[#8FA5A3] cursor-pointer leading-relaxed text-right">
        بإنشاء حساب، أنت توافق على
        <span class="text-[#2BD17C]">شروط الاستخدام</span>
        و
        <span class="text-[#2BD17C]">سياسة الخصوصية</span>
      </label>
      <input
        type="checkbox"
        id="terms"
        formControlName="terms"
        class="w-4 h-4 accent-[#2BD17C] cursor-pointer shrink-0"
      >
    </div>

    <button
      type="submit"
      class="w-full py-4 bg-[#2BD17C] text-white rounded-xl font-bold text-lg hover:bg-[#26BF72] transition-colors mt-1"
    >إنشاء حساب</button>

  </form>

  <p class="text-center mt-5 text-sm text-[#8FA5A3]">
    لديك حساب بالفعل؟
    <a routerLink="/auth/login" class="text-[#2BD17C] font-medium hover:underline">سجل الدخول</a>
  </p>

</div>
