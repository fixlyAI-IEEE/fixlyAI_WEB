<div class="w-full" dir="rtl" style="font-family: 'Tajawal', sans-serif;">

  <div class="text-right mb-6">
    <h1 class="text-2xl font-extrabold mb-1" style="color: #0E3B3F;">
      انضم ل Fixly AI
    </h1>
    <p class="text-sm" style="color: #8FA5A3;">أنشئ حسابك مجاناً في ثوان</p>
  </div>

  <div class="flex justify-center mb-8">
    <div class="flex gap-1 p-1 rounded-full" style="background: #f3f4f6;">
      <button
        class="toggle-btn px-6 py-2 rounded-full text-sm font-bold transition-all duration-200"
        [class.active]="activeTab === 'user'"
        (click)="goTo('user')">
        انضم كمستخدم
      </button>
      <button
        class="toggle-btn px-6 py-2 rounded-full text-sm font-bold transition-all duration-200"
        [class.active]="activeTab === 'tech'"
        (click)="goTo('tech')">
        انضم كفني
      </button>
    </div>
  </div>

  <div *ngIf="activeTab === 'tech'" class="flex items-center justify-center gap-4 mb-8">

    <div class="flex flex-col items-center gap-1">
      <div class="w-10 h-10 rounded-full flex items-center justify-center transition-all"
        [style.background]="currentStep >= 1 ? '#2BD17C' : '#f3f4f6'"
        [style.color]="currentStep >= 1 ? 'white' : '#8FA5A3'">
        <svg *ngIf="currentStep > 1" width="18" height="18" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <svg *ngIf="currentStep === 1" width="18" height="18" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <span class="text-xs font-medium"
        [style.color]="currentStep >= 1 ? '#2BD17C' : '#8FA5A3'">
        بيانات شخصية
      </span>
    </div>

    <div class="w-16 h-[2px] rounded mb-4"
      [style.background]="currentStep > 1 ? '#2BD17C' : '#e5e7eb'">
    </div>

    <div class="flex flex-col items-center gap-1">
      <div class="w-10 h-10 rounded-full flex items-center justify-center transition-all"
        [style.background]="currentStep >= 2 ? '#2BD17C' : '#f3f4f6'"
        [style.color]="currentStep >= 2 ? 'white' : '#8FA5A3'">
        <svg width="18" height="18" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
        </svg>
      </div>
      <span class="text-xs font-medium"
        [style.color]="currentStep >= 2 ? '#2BD17C' : '#8FA5A3'">
        بيانات العمل
      </span>
    </div>

  </div>
<router-outlet (activate)="onActivate($event)"></router-outlet>
  <p class="text-sm text-center mt-5" style="color: #8FA5A3;">
    لديك حساب بالفعل؟
    <span class="font-semibold cursor-pointer hover:underline"
      style="color: var(--secondary);"
      routerLink="/auth/login">
      سجل الدخول
    </span>
  </p>

</div>
