<div class="step-wrapper">

    <div class="step-item">
        <div class="step-circle" [class.step-active]="currentStep === 1" [class.step-done]="currentStep > 1">

            <ng-container *ngIf="currentStep > 1; else personalIcon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="8" r="4" stroke-width="2" />
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke-width="2" stroke-linecap="round" />
                </svg>

            </ng-container>

            <ng-template #personalIcon>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2" />
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" />
                </svg>
            </ng-template>

        </div>
        <span class="step-label" [class.label-active]="currentStep === 1">
            بيانات شخصية
        </span>
    </div>

    <div class="step-divider" [class.divider-done]="currentStep > 1"></div>

    <div class="step-item">
        <div class="step-circle" [class.step-active]="currentStep === 2" [class.step-done]="currentStep > 2">

            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="9" width="18" height="13" rx="2" stroke="currentColor" stroke-width="2" />
                <path d="M8 9V7a4 4 0 0 1 8 0v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>

        </div>
        <span class="step-label" [class.label-active]="currentStep === 2">
            بيانات العمل
        </span>
    </div>

</div>
