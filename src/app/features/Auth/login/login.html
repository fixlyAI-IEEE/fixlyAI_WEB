<form [formGroup]="loginForm" (ngSubmit)="submit()">

    <div>
        <label class="block text-right text-sm font-semibold mb-2" style="color: var(--primary);">
            رقم الهاتف
        </label>
        <div class="relative">
            <input type="tel" formControlName="phone" placeholder="01012345678" class="text-right"
                style="padding-left: 14px; padding-right: 44px;" />
            <span class="absolute top-1/2 -translate-y-1/2" style="right: 14px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8FA5A3" stroke-width="1.8"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2
                      19.79 19.79 0 0 1-8.63-3.07
                      A19.5 19.5 0 0 1 4.69 12
                      19.79 19.79 0 0 1 1.61 3.18
                      A2 2 0 0 1 3.59 1h3a2 2 0 0 1 2 1.72
                      12.84 12.84 0 0 0 .7 2.81
                      a2 2 0 0 1-.45 2.11L7.91 8.9
                      a16 16 0 0 0 6.29 6.29l.83-.82
                      a2 2 0 0 1 2.11-.45
                      12.84 12.84 0 0 0 2.81.7
                      A2 2 0 0 1 22 16.92z" />
                </svg>
            </span>
        </div>
    </div>

    <div>
        <label class="block text-right text-sm font-semibold mb-2" style="color: var(--primary);">
            كلمة المرور
        </label>
        <div class="relative">
            <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="••••••"
                class="text-right" style="padding-left: 44px; padding-right: 14px;" />
            <span class="absolute top-1/2 -translate-y-1/2 cursor-pointer" style="left: 14px;"
                (click)="showPassword = !showPassword">
                <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8FA5A3"
                    stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
                <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8FA5A3"
                    stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
                    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
                    <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
            </span>
        </div>
    </div>

    <div class="text-right" style="margin-top: 2px;">
        <span class="text-sm cursor-pointer hover:underline" style="color: var(--secondary);"
            [routerLink]="['/auth/forget-password']">
            هل نسيت كلمة المرور؟
        </span>
    </div>

    <button type="submit" class="btn-secondary w-full text-base font-bold" style="font-size: 16px; padding: 14px;">
        تسجيل الدخول
    </button>

</form>
