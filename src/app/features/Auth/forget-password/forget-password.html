<div class="w-full">

    <!-- Header -->
    <div class="text-right mb-8">
        <h1 class="text-2xl font-extrabold mb-2" style="color: var(--secondary);">
            إعادة تعيين كلمة المرور
        </h1>
        <p class="text-sm" style="color: var(--text);">
            اكتب رقم هاتفك المسجل في الموقع
        </p>
    </div>

    <!-- Form -->
    <form class="space-y-5" (ngSubmit)="submit()">

        <!-- Phone Field -->
        <div>
            <label class="block text-right text-sm font-semibold mb-2" style="color: var(--primary);">
                رقم الهاتف
            </label>
            <div class="relative">
                <input type="tel" placeholder="01012345678" [(ngModel)]="phone" name="phone" class="text-right"
                    style="padding-left: 14px; padding-right: 44px;" />
                <span class="absolute top-1/2 -translate-y-1/2" style="right: 14px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8FA5A3" stroke-width="1.8"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2
              19.79 19.79 0 0 1-8.63-3.07
              A19.5 19.5 0 0 1 4.69 12
              19.79 19.79 0 0 1 1.61 3.18
              A2 2 0 0 1 3.59 1h3a2 2 0 0 1 2 1.72
              12.84 12.84 0 0 0 .7 2.81
              a2 2 0 0 1-.45 2.11L7.91 8.9
              a16 16 0 0 0 6.29 6.29l.83-.82
              a2 2 0 0 1 2.11-.45
              12.84 12.84 0 0 0 2.81.7
              A2 2 0 0 1 22 16.92z" />
                    </svg>
                </span>
            </div>
        </div>

        <button type="submit" class="w-full font-bold text-base" style="
        background-color: var(--secondary);
        color: white;
        padding: 14px;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        font-family: 'Tajawal', sans-serif;
        transition: background 0.3s;
      ">
            إعادة تعيين
        </button>

    </form>

    <div class="text-center mt-5">
        <span class="text-sm cursor-pointer hover:underline" style="color: var(--text);" routerLink="/auth/login">
            العودة لتسجيل الدخول &larr;
        </span>
    </div>

</div>
