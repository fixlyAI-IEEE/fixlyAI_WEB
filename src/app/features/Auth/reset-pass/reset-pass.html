<!-- reset-password.component.html -->
<div class="w-full">

  <div class="text-right mb-8">
    <h1 class="text-2xl font-extrabold mb-2" style="color: var(--secondary);">
      إنشاء كلمة مرور جديدة
    </h1>
    <p class="text-sm" style="color: var(--text);">
      اكتب كلمة المرور الجديدة
    </p>
  </div>

  <form class="space-y-5" (ngSubmit)="submit()">

    <!-- Password -->
    <div>
      <label class="block text-right text-sm font-semibold mb-2"
        style="color: var(--primary);">كلمة المرور</label>
      <div class="relative">
        <input [type]="showPassword ? 'text' : 'password'"
          placeholder="••••••" [(ngModel)]="password" name="password"
          style="padding-left: 44px; padding-right: 14px;" class="text-right" />
        <span class="absolute top-1/2 -translate-y-1/2 cursor-pointer"
          style="left: 14px;" (click)="showPassword = !showPassword">
          <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="#8FA5A3" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="#8FA5A3" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </span>
      </div>
    </div>

    <!-- Confirm Password -->
    <div>
      <label class="block text-right text-sm font-semibold mb-2"
        style="color: var(--primary);">تأكيد كلمة المرور</label>
      <div class="relative">
        <input [type]="showConfirm ? 'text' : 'password'"
          placeholder="••••••" [(ngModel)]="confirmPassword" name="confirmPassword"
          style="padding-left: 44px; padding-right: 14px;" class="text-right" />
        <span class="absolute top-1/2 -translate-y-1/2 cursor-pointer"
          style="left: 14px;" (click)="showConfirm = !showConfirm">
          <svg *ngIf="!showConfirm" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="#8FA5A3" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="showConfirm" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="#8FA5A3" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </span>
      </div>
    </div>

    <button type="submit" [disabled]="isLoading"
      class="w-full font-bold text-base"
      style="
        background-color: var(--secondary);
        color: white; padding: 14px;
        border-radius: 12px; border: none;
        cursor: pointer; font-family: 'Tajawal', sans-serif;
      ">
      {{ isLoading ? 'جاري الحفظ...' : 'تأكيد' }}
    </button>

  </form>

  <div class="text-center mt-5">
    <span class="text-sm cursor-pointer hover:underline"
      style="color: var(--text);" routerLink="/auth/login">
      العودة لتسجيل الدخول ←
    </span>
  </div>

</div>
