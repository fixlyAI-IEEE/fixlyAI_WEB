<div class="bubble-row" [ngClass]="message.sender">

  <img
    *ngIf="message.sender === 'bot'"
    src="/images/AI_man.png"
    alt="Fixly Bot"
    class="bubble-avatar"
  />

  <div class="bubble-content">
    <span *ngIf="message.sender === 'bot'" class="bubble-label">Fixly Bot</span>

    <div class="bubble-text" [innerHTML]="formattedText"></div>

    <div class="suggested-buttons" *ngIf="message.suggested_buttons?.length">
      <button
        *ngFor="let btn of message.suggested_buttons"
        class="suggest-btn"
        [attr.data-action]="btn.action"
        (click)="buttonClicked.emit(btn)"
      >
        {{ btn.label }}
      </button>
    </div>

    <span class="bubble-time">{{ message.timestamp | date:'shortTime' }}</span>
  </div>

</div>
