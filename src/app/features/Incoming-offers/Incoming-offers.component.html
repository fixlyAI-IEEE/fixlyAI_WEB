<app-nav-bar />

<section class="max-w-4xl mx-auto px-4 py-10 mt-20">

  <div class="text-center mb-10">
    <h1 class="text-[36px] font-extrabold text-[var(--secondary)]">العروض الواردة</h1>
    <p class="text-[15px] text-[var(--text)] mt-2">كل ما تحتاجه في مكان واحد</p>
  </div>

  @if (isLoading) {
    <div class="text-center text-[var(--text)]">جاري التحميل...</div>
  }

  <div class="flex flex-col gap-4">
    @for (offer of offers; track offer.worker_id) {
      <div class="bg-white rounded-2xl p-5 shadow-[0_4px_20px_rgba(0,0,0,0.07)]">

        <div class="flex items-center justify-between mb-4">

          <p class="text-[var(--secondary)] font-bold text-[16px]">{{ offer.job_type }}</p>

          <div class="flex items-center gap-3">
            <div class="text-right">
              <p class="text-[var(--primary)] font-bold text-[15px]">{{ offer.name }}</p>
              <div class="flex items-center justify-end gap-1 mt-1">
                <span class="text-[13px] text-[var(--text)]">{{ offer.rating }}</span>
                <span class="text-yellow-400 text-[14px]">★</span>
              </div>
            </div>
            <div class="w-12 h-12 rounded-full bg-[#f0fdf4] flex items-center justify-center flex-shrink-0">
              <span class="material-symbols-outlined text-[var(--secondary)]">person</span>
            </div>
          </div>

        </div>

        <button class="w-full bg-[var(--secondary)] hover:bg-[var(--hover)] text-white font-bold py-3 rounded-xl transition">
          قبول الطلب
        </button>

      </div>
    }
  </div>

</section>
